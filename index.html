<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Expense Tracker</h2>
        
        <div class="balance-container">
            <h3 class="overall-total">Total Kharcha: ₹<span id="total-amount">0</span></h3>
            
            <div class="month-filter-box">
                <label for="month-filter">📅 Calendar (Mahina chunein):</label>
                <input type="month" id="month-filter">
            </div>
        </div>

        <form id="expense-form">
            <div class="form-control">
                <label for="expense-name">Location / Kahan kharida?</label>
                <input type="text" id="expense-name" placeholder="e.g. Lar Bajar, Pindi" required>
            </div>
            
            <div class="form-control">
                <label for="expense-category">Item / Kya kharida?</label>
                <select id="expense-category" required>
                    <option value="market">🛒 Market / Sabji</option>
                    <option value="food">🍔 Food / Canteen</option>
                    <option value="travel">🚌 Travel / Petrol</option>
                    <option value="education">📚 College / Books</option>
                    <option value="other">💰 Other / Anya</option>
                </select>
            </div>

            <div class="form-control">
                <label for="expense-amount">Kitne paise lage?</label>
                <input type="number" id="expense-amount" placeholder="e.g. 150" required>
            </div>
            <button type="submit" class="btn">Add Expense</button>
        </form>

        <h3>Expense List & History</h3>
        <ul id="expense-list" class="list"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
